openapi: 3.0.1
info:
  title: Getchu API
  description: Getchu 프로젝트 API 명세서
  version: 1.0.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /api/products/nearby:
    get:
      tags:
      - Product
      summary: 근처 상품 목록 조회
      description: |-
        로그인한 회원의 인증된 동네 위치를 기준으로 반경 내 판매 중인 상품을 거리 오름차순으로 조회합니다.
        동네 인증이 되어 있지 않으면 400을 반환합니다.
      operationId: product/nearby-products
      parameters:
      - name: page
        in: query
        description: "페이지 번호 (0부터, 기본값 0)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyProductResponse'
              examples:
                product/nearby-products:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"content\" : [ {\r\
                    \n      \"id\" : 1,\r\n      \"title\" : \"중고 노트북 1\",\r\n   \
                    \   \"price\" : 150000,\r\n      \"status\" : \"SALE\",\r\n  \
                    \    \"categoryName\" : \"전자기기\",\r\n      \"sellerNickname\"\
                    \ : \"판매자1\",\r\n      \"thumbnailUrl\" : \"https://cdn.example.com/img1.jpg\"\
                    ,\r\n      \"locationName\" : \"마포구 합정동\",\r\n      \"distanceKm\"\
                    \ : 0.5,\r\n      \"lat\" : 37.5328,\r\n      \"lng\" : 126.7247\r\
                    \n    }, {\r\n      \"id\" : 2,\r\n      \"title\" : \"중고 노트북\
                    \ 2\",\r\n      \"price\" : 150000,\r\n      \"status\" : \"SALE\"\
                    ,\r\n      \"categoryName\" : \"전자기기\",\r\n      \"sellerNickname\"\
                    \ : \"판매자2\",\r\n      \"thumbnailUrl\" : \"https://cdn.example.com/img2.jpg\"\
                    ,\r\n      \"locationName\" : \"마포구 합정동\",\r\n      \"distanceKm\"\
                    \ : 1.2,\r\n      \"lat\" : 37.5328,\r\n      \"lng\" : 126.7247\r\
                    \n    } ],\r\n    \"pageable\" : {\r\n      \"pageNumber\" : 0,\r\
                    \n      \"pageSize\" : 20,\r\n      \"sort\" : {\r\n        \"\
                    empty\" : true,\r\n        \"sorted\" : false,\r\n        \"unsorted\"\
                    \ : true\r\n      },\r\n      \"offset\" : 0,\r\n      \"paged\"\
                    \ : true,\r\n      \"unpaged\" : false\r\n    },\r\n    \"totalElements\"\
                    \ : 2,\r\n    \"totalPages\" : 1,\r\n    \"last\" : true,\r\n\
                    \    \"size\" : 20,\r\n    \"number\" : 0,\r\n    \"sort\" : {\r\
                    \n      \"empty\" : true,\r\n      \"sorted\" : false,\r\n   \
                    \   \"unsorted\" : true\r\n    },\r\n    \"numberOfElements\"\
                    \ : 2,\r\n    \"first\" : true,\r\n    \"empty\" : false\r\n \
                    \ }\r\n}"
  /api/location/verify/address:
    post:
      tags:
      - Location
      summary: 주소 기반 동네 인증
      description: 주소 텍스트를 카카오 API로 좌표 변환 후 행정구역명으로 변환하여 동네를 인증합니다.
      operationId: location/verify-address
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressVerifyRequest'
            examples:
              location/verify-address:
                value: "{\r\n  \"address\" : \"서울 마포구 합정동\"\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationVerifyResponse'
              examples:
                location/verify-address:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"동네 인\
                    증이 완료되었습니다.\",\r\n  \"data\" : {\r\n    \"locationName\" : \"마\
                    포구 합정동\",\r\n    \"locationRadius\" : 3\r\n  }\r\n}"
  /api/location/verify/gps:
    post:
      tags:
      - Location
      summary: GPS 기반 동네 인증
      description: GPS 좌표를 카카오 API로 행정구역명으로 변환하여 회원의 동네를 인증합니다.
      operationId: location/verify-gps
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GpsVerifyRequest'
            examples:
              location/verify-gps:
                value: "{\r\n  \"lat\" : 37.549,\r\n  \"lng\" : 126.914\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationVerifyResponse'
              examples:
                location/verify-gps:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"동네 인\
                    증이 완료되었습니다.\",\r\n  \"data\" : {\r\n    \"locationName\" : \"마\
                    포구 합정동\",\r\n    \"locationRadius\" : 3\r\n  }\r\n}"
  /members/me:
    get:
      tags:
      - Member
      summary: 내 정보 조회
      description: 내 정보 조회
      operationId: member-get-me
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                member-get-me:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 1,\r\n \
                    \   \"email\" : \"test@email.com\",\r\n    \"nickname\" : \"테스\
                    트유저\",\r\n    \"profileImageUrl\" : \"https://example.com/profile.jpg\"\
                    ,\r\n    \"averageRating\" : 4.5,\r\n    \"reviewCount\" : 10,\r\
                    \n    \"createdAt\" : \"2026-04-22T21:16:36.0397098\"\r\n  }\r\
                    \n}"
    delete:
      tags:
      - Member
      summary: 회원 탈퇴
      description: 로그인한 회원 계정을 삭제합니다.
      operationId: member/delete-member
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMemberResponse'
              examples:
                member/delete-member:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"회원탈퇴\
                    가 완료되었습니다.\"\r\n}"
    patch:
      tags:
      - Member
      summary: 내 정보 수정
      description: |-
        닉네임 또는 프로필 이미지 URL을 수정합니다.
        변경하지 않을 필드는 null로, 프로필 이미지를 삭제하려면 빈 문자열("")로 전송합니다.
      operationId: member/update-member
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdateRequest'
            examples:
              member/update-member:
                value: "{\r\n  \"nickname\" : \"새닉네임\",\r\n  \"profileImageUrl\" :\
                  \ \"https://cdn.example.com/new.jpg\"\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                member/update-member:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 1,\r\n \
                    \   \"email\" : \"test@test.com\",\r\n    \"nickname\" : \"새닉네\
                    임\",\r\n    \"profileImageUrl\" : \"https://cdn.example.com/new.jpg\"\
                    ,\r\n    \"averageRating\" : 4.5,\r\n    \"reviewCount\" : 12,\r\
                    \n    \"createdAt\" : \"2024-01-01T00:00:00\"\r\n  }\r\n}"
  /members/{memberId}:
    get:
      tags:
      - Member
      summary: 타 회원 프로필 조회
      description: 비로그인 상태에서도 조회 가능한 타 회원의 공개 프로필 정보를 조회합니다.
      operationId: member/get-member-profile
      parameters:
      - name: memberId
        in: path
        description: 조회할 회원 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfileResponse'
              examples:
                member/get-member-profile:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 2,\r\n \
                    \   \"nickname\" : \"상대방닉네임\",\r\n    \"profileImageUrl\" : \"\
                    https://cdn.example.com/other.jpg\",\r\n    \"averageRating\"\
                    \ : 4.2,\r\n    \"reviewCount\" : 7,\r\n    \"createdAt\" : \"\
                    2024-03-15T00:00:00\"\r\n  }\r\n}"
  /members/me/likes:
    get:
      tags:
      - Like
      summary: 내 찜 목록 조회
      description: 사용자가 찜한 상품 목록을 페이징하여 조회합니다.
      operationId: like/my-likes
      parameters:
      - name: page
        in: query
        description: 페이지 번호 (0부터 시작)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: 페이지 크기 (기본값 10)
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: "정렬 옵션 (기본값 createdAt,desc)"
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyLikesResponse'
              examples:
                like/my-likes:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"content\" : [ {\r\
                    \n      \"id\" : 1,\r\n      \"title\" : \"아이폰 17\",\r\n     \
                    \ \"price\" : 1000000,\r\n      \"status\" : \"SALE\",\r\n   \
                    \   \"thumbnailUrl\" : \"https://image.url/test.jpg\",\r\n   \
                    \   \"likeCount\" : 0,\r\n      \"createdAt\" : \"2026-04-22T21:16:12.2610414\"\
                    \r\n    } ],\r\n    \"pageable\" : {\r\n      \"pageNumber\" :\
                    \ 0,\r\n      \"pageSize\" : 10,\r\n      \"sort\" : {\r\n   \
                    \     \"empty\" : true,\r\n        \"sorted\" : false,\r\n   \
                    \     \"unsorted\" : true\r\n      },\r\n      \"offset\" : 0,\r\
                    \n      \"paged\" : true,\r\n      \"unpaged\" : false\r\n   \
                    \ },\r\n    \"totalElements\" : 1,\r\n    \"totalPages\" : 1,\r\
                    \n    \"last\" : true,\r\n    \"size\" : 10,\r\n    \"number\"\
                    \ : 0,\r\n    \"sort\" : {\r\n      \"empty\" : true,\r\n    \
                    \  \"sorted\" : false,\r\n      \"unsorted\" : true\r\n    },\r\
                    \n    \"numberOfElements\" : 1,\r\n    \"first\" : true,\r\n \
                    \   \"empty\" : false\r\n  }\r\n}"
  /members/me/password:
    patch:
      tags:
      - Member
      summary: 비밀번호 변경
      description: |-
        현재 비밀번호를 확인한 후 새 비밀번호로 변경합니다.
        새 비밀번호는 영문·숫자·특수문자를 각각 1자 이상 포함해야 합니다.
      operationId: member/update-password
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
            examples:
              member/update-password:
                value: "{\r\n  \"oldPassword\" : \"OldPass1!\",\r\n  \"newPassword\"\
                  \ : \"NewPass2@\"\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePasswordResponse'
              examples:
                member/update-password:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"비밀번호\
                    가 변경되었습니다.\"\r\n}"
  /members/{memberId}/reviews:
    get:
      tags:
      - Review
      summary: 리뷰 목록 조회
      description: |
        특정 회원이 받은 리뷰 목록을 커서 기반 페이지네이션으로 조회합니다.
        - 비로그인 상태에서도 조회 가능합니다.
        - 최신 리뷰가 먼저 반환됩니다.
        - 다음 페이지 조회 시 응답의 nextCursor 값을 cursor 파라미터로 전달합니다.
      operationId: review/get-reviews
      parameters:
      - name: memberId
        in: path
        description: 리뷰를 조회할 회원 ID
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: 페이지 커서 (첫 페이지는 생략)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: "페이지 크기 (기본값: 10)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
              examples:
                review/get-reviews:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"content\" : [ {\r\
                    \n      \"id\" : 2,\r\n      \"reviewerId\" : 10,\r\n      \"\
                    rating\" : 4.5,\r\n      \"content\" : \"친절하고 물건도 좋았습니다.\",\r\n\
                    \      \"createdAt\" : \"2024-06-10T14:00:00\",\r\n      \"reviewerNickname\"\
                    \ : \"구매자닉네임\",\r\n      \"reviewerProfileImageUrl\" : \"https://cdn.example.com/buyer.jpg\"\
                    ,\r\n      \"productTitle\" : \"아이폰 15 팝니다\"\r\n    }, {\r\n \
                    \     \"id\" : 1,\r\n      \"reviewerId\" : 11,\r\n      \"rating\"\
                    \ : 3.5,\r\n      \"content\" : \"무난한 거래였습니다.\",\r\n      \"createdAt\"\
                    \ : \"2024-05-20T09:30:00\",\r\n      \"reviewerNickname\" : \"\
                    다른구매자\",\r\n      \"reviewerProfileImageUrl\" : null,\r\n    \
                    \  \"productTitle\" : \"맥북 에어 M2\"\r\n    } ],\r\n    \"nextCursor\"\
                    \ : \"eyJpZCI6MX0=\",\r\n    \"hasNext\" : true\r\n  }\r\n}"
  /members/{memberId}/reviews/written:
    get:
      tags:
      - Review
      summary: 작성한 리뷰 목록 조회
      description: |
        특정 회원이 작성한 리뷰 목록을 커서 기반 페이지네이션으로 조회합니다.
        - 비로그인 상태에서도 조회 가능합니다.
        - 최신 리뷰가 먼저 반환됩니다.
        - 다음 페이지 조회 시 응답의 nextCursor 값을 cursor 파라미터로 전달합니다.
      operationId: review/get-written-reviews
      parameters:
      - name: memberId
        in: path
        description: 리뷰를 조회할 회원 ID
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: 페이지 커서 (첫 페이지는 생략)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: "페이지 크기 (기본값: 10)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
              examples:
                review/get-written-reviews:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"content\" : [ {\r\
                    \n      \"id\" : 2,\r\n      \"reviewerId\" : 10,\r\n      \"\
                    rating\" : 4.5,\r\n      \"content\" : \"친절하고 물건도 좋았습니다.\",\r\n\
                    \      \"createdAt\" : \"2024-06-10T14:00:00\",\r\n      \"reviewerNickname\"\
                    \ : \"구매자닉네임\",\r\n      \"reviewerProfileImageUrl\" : \"https://cdn.example.com/buyer.jpg\"\
                    ,\r\n      \"productTitle\" : \"아이폰 15 팝니다\"\r\n    }, {\r\n \
                    \     \"id\" : 1,\r\n      \"reviewerId\" : 11,\r\n      \"rating\"\
                    \ : 3.5,\r\n      \"content\" : \"무난한 거래였습니다.\",\r\n      \"createdAt\"\
                    \ : \"2024-05-20T09:30:00\",\r\n      \"reviewerNickname\" : \"\
                    다른구매자\",\r\n      \"reviewerProfileImageUrl\" : null,\r\n    \
                    \  \"productTitle\" : \"맥북 에어 M2\"\r\n    } ],\r\n    \"nextCursor\"\
                    \ : \"eyJpZCI6MX0=\",\r\n    \"hasNext\" : true\r\n  }\r\n}"
  /products/{productId}/likes:
    post:
      tags:
      - Like
      summary: 상품 찜하기
      description: 특정 상품을 찜 목록에 추가합니다.
      operationId: like/create-like
      parameters:
      - name: productId
        in: path
        description: 상품 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLikeResponse'
              examples:
                like/create-like:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\"\r\n}"
    delete:
      tags:
      - Like
      summary: 상품 찜 취소
      description: 특정 상품을 찜 목록에서 제거합니다.
      operationId: like/delete-like
      parameters:
      - name: productId
        in: path
        description: 상품 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteLikeResponse'
              examples:
                like/delete-like:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\"\r\n}"
  /trades/{tradeId}/reviews:
    post:
      tags:
      - Review
      summary: 리뷰 작성
      description: |
        거래 완료(SOLD) 상태인 거래에 대해 구매자가 판매자에게 리뷰를 작성합니다.
        - 거래당 리뷰는 1건만 작성 가능합니다.
        - 평점은 0.5 ~ 5.0 사이의 0.5 단위 값만 허용됩니다.
      operationId: review/create-review
      parameters:
      - name: tradeId
        in: path
        description: 리뷰를 작성할 거래 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            examples:
              review/create-review:
                value: "{\r\n  \"rating\" : 4.5,\r\n  \"content\" : \"친절하고 물건도 좋았습\
                  니다. 다음에 또 거래하고 싶어요.\"\r\n}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCreateResponse'
              examples:
                review/create-review:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\"\r\n}"
  /trades/{tradeId}/status:
    patch:
      tags:
      - Trade
      summary: 거래 상태 변경
      description: 거래 상태 변경
      operationId: trade/update-status
      parameters:
      - name: tradeId
        in: path
        description: 거래 ID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/trades-tradeId-status1569848466'
            examples:
              trade/update-status:
                value: "{\"status\":\"TRADING\"}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/trades-tradeId-status486549215'
              examples:
                trade/update-status:
                  value: "{\"code\":\"SUCCESS\",\"message\":\"요청이 성공적으로 처리되었습니다.\"\
                    }"
