openapi: 3.0.1
info:
  title: Getchu API
  description: Getchu 프로젝트 API 명세서
  version: 1.0.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /members/me:
    get:
      tags:
      - Member
      summary: 내 정보 조회
      description: 내 정보 조회
      operationId: member-get-me
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                member-get-me:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 1,\r\n \
                    \   \"email\" : \"test@email.com\",\r\n    \"nickname\" : \"테스\
                    트유저\",\r\n    \"profileImageUrl\" : \"https://example.com/profile.jpg\"\
                    ,\r\n    \"averageRating\" : 4.5,\r\n    \"reviewCount\" : 10,\r\
                    \n    \"createdAt\" : \"2026-04-16T20:13:20.8683118\"\r\n  }\r\
                    \n}"
    delete:
      tags:
      - Member
      summary: 회원 탈퇴
      description: 로그인한 회원 계정을 삭제합니다.
      operationId: member/delete-member
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMemberResponse'
              examples:
                member/delete-member:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"회원탈퇴\
                    가 완료되었습니다.\"\r\n}"
    patch:
      tags:
      - Member
      summary: 내 정보 수정
      description: |-
        닉네임 또는 프로필 이미지 URL을 수정합니다.
        변경하지 않을 필드는 null로, 프로필 이미지를 삭제하려면 빈 문자열("")로 전송합니다.
      operationId: member/update-member
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdateRequest'
            examples:
              member/update-member:
                value: "{\r\n  \"nickname\" : \"새닉네임\",\r\n  \"profileImageUrl\" :\
                  \ \"https://cdn.example.com/new.jpg\"\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
              examples:
                member/update-member:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 1,\r\n \
                    \   \"email\" : \"test@test.com\",\r\n    \"nickname\" : \"새닉네\
                    임\",\r\n    \"profileImageUrl\" : \"https://cdn.example.com/new.jpg\"\
                    ,\r\n    \"averageRating\" : 4.5,\r\n    \"reviewCount\" : 12,\r\
                    \n    \"createdAt\" : \"2024-01-01T00:00:00\"\r\n  }\r\n}"
  /members/{memberId}:
    get:
      tags:
      - Member
      summary: 타 회원 프로필 조회
      description: 비로그인 상태에서도 조회 가능한 타 회원의 공개 프로필 정보를 조회합니다.
      operationId: member/get-member-profile
      parameters:
      - name: memberId
        in: path
        description: 조회할 회원 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfileResponse'
              examples:
                member/get-member-profile:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"id\" : 2,\r\n \
                    \   \"nickname\" : \"상대방닉네임\",\r\n    \"profileImageUrl\" : \"\
                    https://cdn.example.com/other.jpg\",\r\n    \"averageRating\"\
                    \ : 4.2,\r\n    \"reviewCount\" : 7,\r\n    \"createdAt\" : \"\
                    2024-03-15T00:00:00\"\r\n  }\r\n}"
  /members/me/password:
    patch:
      tags:
      - Member
      summary: 비밀번호 변경
      description: |-
        현재 비밀번호를 확인한 후 새 비밀번호로 변경합니다.
        새 비밀번호는 영문·숫자·특수문자를 각각 1자 이상 포함해야 합니다.
      operationId: member/update-password
      parameters:
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
            examples:
              member/update-password:
                value: "{\r\n  \"oldPassword\" : \"OldPass1!\",\r\n  \"newPassword\"\
                  \ : \"NewPass2@\"\r\n}"
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePasswordResponse'
              examples:
                member/update-password:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"비밀번호\
                    가 변경되었습니다.\"\r\n}"
  /members/{memberId}/reviews:
    get:
      tags:
      - Review
      summary: 리뷰 목록 조회
      description: |
        특정 회원이 받은 리뷰 목록을 커서 기반 페이지네이션으로 조회합니다.
        - 비로그인 상태에서도 조회 가능합니다.
        - 최신 리뷰가 먼저 반환됩니다.
        - 다음 페이지 조회 시 응답의 nextCursor 값을 cursor 파라미터로 전달합니다.
      operationId: review/get-reviews
      parameters:
      - name: memberId
        in: path
        description: 리뷰를 조회할 회원 ID
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: 페이지 커서 (첫 페이지는 생략)
        required: false
        schema:
          type: string
      - name: size
        in: query
        description: "페이지 크기 (기본값: 10)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
              examples:
                review/get-reviews:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\",\r\n  \"data\" : {\r\n    \"content\" : [ {\r\
                    \n      \"id\" : 2,\r\n      \"rating\" : 4.5,\r\n      \"content\"\
                    \ : \"친절하고 물건도 좋았습니다.\",\r\n      \"createdAt\" : \"2024-06-10T14:00:00\"\
                    ,\r\n      \"reviewerNickname\" : \"구매자닉네임\",\r\n      \"reviewerProfileImageUrl\"\
                    \ : \"https://cdn.example.com/buyer.jpg\",\r\n      \"productTitle\"\
                    \ : \"아이폰 15 팝니다\"\r\n    }, {\r\n      \"id\" : 1,\r\n      \"\
                    rating\" : 3.5,\r\n      \"content\" : \"무난한 거래였습니다.\",\r\n  \
                    \    \"createdAt\" : \"2024-05-20T09:30:00\",\r\n      \"reviewerNickname\"\
                    \ : \"다른구매자\",\r\n      \"reviewerProfileImageUrl\" : null,\r\n\
                    \      \"productTitle\" : \"맥북 에어 M2\"\r\n    } ],\r\n    \"nextCursor\"\
                    \ : \"eyJpZCI6MX0=\",\r\n    \"hasNext\" : true\r\n  }\r\n}"
  /trades/{tradeId}/reviews:
    post:
      tags:
      - Review
      summary: 리뷰 작성
      description: |
        거래 완료(SOLD) 상태인 거래에 대해 구매자가 판매자에게 리뷰를 작성합니다.
        - 거래당 리뷰는 1건만 작성 가능합니다.
        - 평점은 0.5 ~ 5.0 사이의 0.5 단위 값만 허용됩니다.
      operationId: review/create-review
      parameters:
      - name: tradeId
        in: path
        description: 리뷰를 작성할 거래 ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer JWT 액세스 토큰
        required: true
        schema:
          type: string
        example: Bearer test-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            examples:
              review/create-review:
                value: "{\r\n  \"rating\" : 4.5,\r\n  \"content\" : \"친절하고 물건도 좋았습\
                  니다. 다음에 또 거래하고 싶어요.\"\r\n}"
      responses:
        "201":
          description: "201"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCreateResponse'
              examples:
                review/create-review:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"요청이\
                    \ 성공적으로 처리되었습니다.\"\r\n}"
components:
  schemas:
    DeleteMemberResponse:
      title: DeleteMemberResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드 (SUCCESS)
        message:
          type: string
          description: '"회원탈퇴가 완료되었습니다."'
    MemberProfileResponse:
      title: MemberProfileResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드 (SUCCESS)
        data:
          required:
          - averageRating
          - createdAt
          - id
          - nickname
          - reviewCount
          type: object
          properties:
            createdAt:
              type: string
              description: 가입 일시
            reviewCount:
              type: number
              description: 리뷰 수
            averageRating:
              type: number
              description: 평균 평점
            nickname:
              type: string
              description: 닉네임
            id:
              type: number
              description: 회원 ID
            profileImageUrl:
              type: string
              description: 프로필 이미지 URL (없으면 null)
              nullable: true
        message:
          type: string
          description: 응답 메시지
    UpdatePasswordRequest:
      title: UpdatePasswordRequest
      required:
      - newPassword
      - oldPassword
      type: object
      properties:
        oldPassword:
          type: string
          description: 현재 비밀번호
        newPassword:
          type: string
          description: "새 비밀번호 (8자 이상, 영문·숫자·특수문자 각 1자 이상 포함)"
    MemberResponse:
      title: MemberResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드
        data:
          required:
          - averageRating
          - createdAt
          - email
          - id
          - nickname
          - reviewCount
          type: object
          properties:
            createdAt:
              type: string
              description: 가입 일시
            reviewCount:
              type: number
              description: 리뷰 수
            averageRating:
              type: number
              description: 평균 평점
            nickname:
              type: string
              description: 닉네임
            id:
              type: number
              description: 회원 ID
            profileImageUrl:
              type: string
              description: 프로필 이미지 URL
              nullable: true
            email:
              type: string
              description: 이메일
        message:
          type: string
          description: 응답 메시지
    UpdatePasswordResponse:
      title: UpdatePasswordResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드 (SUCCESS)
        message:
          type: string
          description: '"비밀번호가 변경되었습니다."'
    ReviewRequest:
      title: ReviewRequest
      required:
      - content
      - rating
      type: object
      properties:
        rating:
          type: number
          description: "평점 (0.5 ~ 5.0, 0.5 단위)"
        content:
          type: string
          description: 리뷰 내용 (500자 이내)
    MemberUpdateRequest:
      title: MemberUpdateRequest
      type: object
      properties:
        nickname:
          type: string
          description: 변경할 닉네임 (2~20자). null 전송 시 변경 없음
          nullable: true
        profileImageUrl:
          type: string
          description: "변경할 프로필 이미지 URL. \"\" 전송 시 이미지 삭제, null 전송 시 변경 없음"
          nullable: true
    ReviewCreateResponse:
      title: ReviewCreateResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드 (SUCCESS)
        message:
          type: string
          description: 응답 메시지
    ReviewListResponse:
      title: ReviewListResponse
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          description: 응답 코드 (SUCCESS)
        data:
          required:
          - hasNext
          type: object
          properties:
            nextCursor:
              type: string
              description: 다음 페이지 커서 (마지막 페이지면 null)
              nullable: true
            hasNext:
              type: boolean
              description: 다음 페이지 존재 여부
            content:
              type: array
              items:
                required:
                - content
                - createdAt
                - id
                - productTitle
                - rating
                - reviewerNickname
                type: object
                properties:
                  productTitle:
                    type: string
                    description: 거래된 상품명
                  createdAt:
                    type: string
                    description: 작성 일시
                  reviewerNickname:
                    type: string
                    description: 리뷰 작성자 닉네임
                  reviewerProfileImageUrl:
                    type: string
                    description: 리뷰 작성자 프로필 이미지 URL (없으면 null)
                    nullable: true
                  rating:
                    type: number
                    description: 평점 (0.5 ~ 5.0)
                  id:
                    type: number
                    description: 리뷰 ID
                  content:
                    type: string
                    description: 리뷰 내용
        message:
          type: string
          description: 응답 메시지
