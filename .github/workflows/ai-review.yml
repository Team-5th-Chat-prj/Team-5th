name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 50000 > /tmp/review-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/review-diff.txt)
          echo "size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"

      - name: Check diff size
        id: check
        run: |
          if [ "${{ steps.diff.outputs.size }}" -lt 100 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Request AI Review
        id: review
        if: steps.check.outputs.skip == 'false'
        env:
          REVIEW_SERVER_URL: ${{ secrets.REVIEW_SERVER_URL }}
          REVIEW_SECRET:     ${{ secrets.REVIEW_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --rawfile diff   /tmp/review-diff.txt \
            --arg pr_title    "${{ github.event.pull_request.title }}" \
            --arg pr_author   "${{ github.event.pull_request.user.login }}" \
            --arg repo        "${{ github.repository }}" \
            --argjson pr_num  "${{ github.event.pull_request.number }}" \
            --arg base        "${{ github.base_ref }}" \
            '{diff:$diff, pr_title:$pr_title, pr_author:$pr_author, repo:$repo, pr_number:$pr_num, base_branch:$base}')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 90 \
            -X POST "${REVIEW_SERVER_URL}/review" \
            -H "Content-Type: application/json" \
            -H "x-review-secret: ${REVIEW_SECRET}" \
            -H "x-github-repo: ${{ github.repository }}" \
            -d "$PAYLOAD")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::리뷰 서버 오류 (HTTP $HTTP_CODE)"
            echo "text=⚠️ 리뷰 서버 응답 오류 (HTTP ${HTTP_CODE})" >> "$GITHUB_OUTPUT"
          else
            REVIEW_TEXT=$(echo "$HTTP_BODY" | jq -r '.review // "리뷰 내용을 가져올 수 없습니다."')
            {
              echo "text<<REVIEW_EOF"
              echo "$REVIEW_TEXT"
              echo "REVIEW_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post Review Comment
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.text }}
        with:
          script: |
            const body = [
              "## 🤖 AI 코드리뷰\n",
              process.env.REVIEW_TEXT,
              "\n---",
              `> *AI 리뷰는 참고용입니다. 최종 판단은 팀원이 직접 합니다.*`
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });