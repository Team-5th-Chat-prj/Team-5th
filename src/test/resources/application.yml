spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: never  # 테스트에서 data.sql 실행 안 함 (각 테스트가 직접 데이터 세팅)
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true  # Hibernate DDL 이후 data.sql 실행
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

jwt:
  secret-key: test-secret-key-must-be-at-least-32-characters-long!!
  access-expiration-time: 900000
  refresh-expiration-time: 604800000

# 테스트 환경 분산락 설정 (빠른 실패 → 테스트 속도 개선)
lock:
  retry:
    max: 100                 # 테스트용: 동시성 테스트(100 threads)에서 모두 성공시키기 위해 재시도 횟수 증가 (운영: 30)
    initial-backoff-ms: 10   # 운영 50ms → 테스트 10ms
    max-backoff-ms: 100      # 운영 1000ms → 테스트 100ms
  expiration-seconds: 5      # 테스트용: 락 유지 시간 여유 증가 (운영: 3초)

kakao:
  api-key: test-kakao-api-key
